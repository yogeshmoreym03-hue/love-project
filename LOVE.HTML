<html>
<head>
    <title>Love Question 💖</title>
    <style>
        body {
            text-align: center;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ff9a9e, #fad0c4);
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin-top: 100px;
            font-size: 40px;
            color: #fff;
        }

        button {
            padding: 12px 25px;
            font-size: 20px;
            margin: 15px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        #yesBtn {
            background-color: #4CAF50;
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.2);
        }

        #noBtn {
            background-color: #ff4d4d;
            color: white;
            position: absolute;
        }

        .angry {
            animation: shake 0.3s;
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
            100% { transform: translate(2px, 2px); }
        }
    </style>
</head>
<body>

    <h1>Do you love me? ❤️</h1>

    <button id="yesBtn" onclick="yesClicked()">Yes 😍</button>
    <button id="noBtn" onmouseover="moveButton()">No 😡</button>

    <script>
        function yesClicked() {
            document.body.innerHTML = "<h1 style='color:white; margin-top:200px;'>Awwww 😍 I love you too! 💖</h1>";
        }

        function moveButton() {
            let btn = document.getElementById("noBtn");

            // Add angry animation
            btn.classList.add("angry");

            setTimeout(() => {
                btn.classList.remove("angry");
            }, 300);

            // Move to random position
            let x = Math.random() * (window.innerWidth - 100);
            let y = Math.random() * (window.innerHeight - 50);

            btn.style.left = x + "px";
            btn.style.top = y + "px";
        }
    </script>

</body>
</html>
