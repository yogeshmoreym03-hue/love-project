<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
}

.container {
    position: relative;
    z-index: 2;
    padding-top: 80px;
}

h1 {
    font-size: 3rem;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 30px #ff1a75, 0 0 50px #ff1a75; }
}

#name {
    font-size: 2rem;
    margin-top: 10px;
}

#message {
    font-size: 1.2rem;
    margin: 25px auto;
    max-width: 700px;
    min-height: 80px;
    padding: 0 20px;
}

button {
    padding: 12px 24px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background: #ff1a75;
    color: white;
    font-size: 18px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.08);
}

/* Hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff1a75;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff1a75;
    border-radius: 50%;
}

.heart::before {
    top: -10px;
    left: 0;
}

.heart::after {
    left: -10px;
    top: 0;
}

@keyframes float {
    0% {
        transform: translateY(100vh) rotate(45deg);
        opacity: 1;
    }
    100% {
        transform: translateY(-10vh) rotate(45deg);
        opacity: 0;
    }
}

/* Hidden YouTube player */
#youtube-player {
    width: 0;
    height: 0;
    border: 0;
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Anniversary ❤️</h1>
    <div id="name">Dear YOUR_GIRL_NAME 💕</div>
    <div id="message"></div>

    <button onclick="startLove()">Click for Surprise 💖</button>
    <button onclick="toggleMusic()">🎵 Play / Pause Music</button>
</div>

<!-- Hidden YouTube Music -->
<iframe 
    id="youtube-player"
    src=""
    allow="autoplay">
</iframe>

<script>
const messageText = "YOUR_MESSAGE";
const videoID = "YOUR_VIDEO_ID";

let index = 0;
let musicPlaying = false;

function startLove() {
    if(index === 0){
        typeMessage();
    }
    createHearts();
    playMusic();
}

function typeMessage() {
    if (index < messageText.length) {
        document.getElementById("message").innerHTML += messageText.charAt(index);
        index++;
        setTimeout(typeMessage, 45);
    }
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 6000);
    }, 300);
}

function playMusic() {
    if (!musicPlaying) {
        document.getElementById("youtube-player").src =
            `https://www.youtube.com/embed/${videoID}?autoplay=1&loop=1&playlist=${videoID}`;
        musicPlaying = true;
    }
}

function toggleMusic() {
    const player = document.getElementById("youtube-player");

    if (musicPlaying) {
        player.src = "";
        musicPlaying = false;
    } else {
        player.src =
            `https://www.youtube.com/watch?v=NUo8CKI34o4&list=RD1L2JJz0Kr-I&index=20${videoID}?autoplay=1&loop=1&playlist=${videoID}`;
        musicPlaying = true;
    }
}
</script>

</body>
</html>
