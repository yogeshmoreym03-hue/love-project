<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Anniversary ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    color: white;
}

h1 {
    margin-top: 80px;
    font-size: 3em;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 25px #ff1a75, 0 0 40px #ff1a75; }
}

#name {
    font-size: 2em;
    margin-top: 10px;
}

#message {
    font-size: 1.4em;
    margin-top: 20px;
    padding: 0 20px;
}

/* Hearts */
.heart {
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff1a75;
    transform: rotate(45deg);
    animation: float 6s linear infinite;
}

.heart::before,
.heart::after {
    content: '';
    position: absolute;
    width: 20px;
    height: 20px;
    background: #ff1a75;
    border-radius: 50%;
}

.heart::before { top: -10px; left: 0; }
.heart::after { left: -10px; top: 0; }

@keyframes float {
    0% { transform: translateY(100vh) rotate(45deg); opacity: 1; }
    100% { transform: translateY(-10vh) rotate(45deg); opacity: 0; }
}

button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff1a75;
    color: white;
    cursor: pointer;
}

button:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>

<h1>Happy Anniversary ❤️</h1>
<div id="name">Dear Shravani💕</div>
<div id="message"></div>

<button onclick="startLove()">Click for Surprise 💖</button>
<br>
<button onclick="toggleMusic()">🎵 Play / Pause Music</button>

<!-- 🎵 Audio -->
<audio id="bgMusic" loop>
    <source src="https://www.youtube.com/watch?v=NUo8CKI34o4&list=RD1L2JJz0Kr-I&index=20" type="audio/mpeg">
</audio>

<script>
const messageText = "tum hi ho aur tum hi rahogi ❤️";
let i = 0;

function startLove() {
    typeMessage();
    createHearts();
    playMusic();
}

function typeMessage() {
    if (i < messageText.length) {
        document.getElementById("message").innerHTML += messageText.charAt(i);
        i++;
        setTimeout(typeMessage, 40);
    }
}

function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.style.left = Math.random() * window.innerWidth + "px";
        heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
        document.body.appendChild(heart);

        setTimeout(() => heart.remove(), 6000);
    }, 300);
}

// 🎵 Music Controls
function playMusic() {
    document.getElementById("bgMusic").play();
}

function toggleMusic() {
    const music = document.getElementById("bgMusic");
    if (music.paused) {
        music.play();
    } else {
        music.pause();
    }
}
</script>

</body>
</html>
